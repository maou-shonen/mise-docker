name: Build and Publish Docker Image

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mise

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-build: ${{ steps.compare.outputs.should-build }}
      versions-hash: ${{ steps.fetch.outputs.versions-hash }}
    steps:
      - name: Fetch latest versions
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Retry wrapper: handles both HTTP errors and curl transport failures
          # Up to 3 attempts with exponential backoff (5s, 10s between attempts)
          fetch_with_retry() {
            local url="$1"
            shift
            local max_retries=3
            local attempt=0
            local wait=5
            local body_file
            body_file=$(mktemp)
            trap "rm -f '$body_file'" RETURN

            while [ "$attempt" -lt "$max_retries" ]; do
              local curl_exit=0
              local HTTP_CODE
              : > "$body_file"
              HTTP_CODE=$(curl -sS --connect-timeout 10 --max-time 30 \
                -o "$body_file" -w '%{http_code}' "$@" "$url") || curl_exit=$?

              if [ "$curl_exit" -eq 0 ] && [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                cat "$body_file"
                return 0
              fi

              attempt=$((attempt + 1))
              if [ "$curl_exit" -ne 0 ]; then
                echo "::warning::curl failed (exit ${curl_exit}) for ${url}, attempt ${attempt}/${max_retries}" >&2
              else
                echo "::warning::HTTP ${HTTP_CODE} from ${url}, attempt ${attempt}/${max_retries}" >&2
              fi

              if [ "$attempt" -lt "$max_retries" ]; then
                echo "::warning::Retrying in ${wait}s..." >&2
                sleep "$wait"
                wait=$((wait * 2))
              fi
            done

            echo "::error::Failed to fetch ${url} after ${max_retries} attempts" >&2
            [ -s "$body_file" ] && cat "$body_file" >&2
            return 1
          }

          # mise: fetch latest release tag from GitHub API (authenticated to avoid rate limits)
          MISE_VERSION=$(fetch_with_retry \
            "https://api.github.com/repos/jdx/mise/releases/latest" \
            -H "Authorization: Bearer ${GH_TOKEN}" | jq -r '.tag_name')
          if [ -z "${MISE_VERSION}" ] || [ "${MISE_VERSION}" = "null" ]; then
            echo "::error::Failed to fetch mise version"
            exit 1
          fi

          # Node.js LTS: fetch from official API
          NODE_VERSION=$(fetch_with_retry \
            "https://nodejs.org/dist/index.json" | jq -r '[.[] | select(.lts != false)][0].version')
          if [ -z "${NODE_VERSION}" ] || [ "${NODE_VERSION}" = "null" ]; then
            echo "::error::Failed to fetch Node.js LTS version"
            exit 1
          fi

          HASH="${MISE_VERSION}-${NODE_VERSION}"
          echo "mise=${MISE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "node=${NODE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "versions-hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "::notice::mise=${MISE_VERSION}, node=${NODE_VERSION}, hash=${HASH}"

      - name: Restore previous version cache
        id: cache
        uses: actions/cache@v4
        with:
          path: /tmp/version-hash
          key: version-hash-${{ steps.fetch.outputs.versions-hash }}
          restore-keys: |
            version-hash-

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.fetch.outputs.versions-hash }}"
          if [ -f /tmp/version-hash ] && [ "$(cat /tmp/version-hash)" = "${CURRENT}" ]; then
            echo "should-build=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Versions unchanged, skipping build"
          else
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            echo "${CURRENT}" > /tmp/version-hash
            echo "::notice::Version change detected, will build"
          fi

  build-and-push:
    needs: check-versions
    if: |
      github.event_name != 'schedule' ||
      needs.check-versions.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant:
          - target: base
            tag-suffix: "latest"
          - target: node
            tag-suffix: "node"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.variant.tag-suffix }}
            type=schedule,pattern={{date 'YYYYMMDD'}}-${{ matrix.variant.tag-suffix }}
            type=sha,prefix={{date 'YYYYMMDD'}}-${{ matrix.variant.tag-suffix }}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.variant.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG=$(date -u +%Y%m%d)
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Docker images built on $(date -u +%Y-%m-%d)" \
            --target "${{ github.sha }}" \
            --latest
