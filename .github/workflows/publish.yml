name: Build and Publish Docker Image

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mise

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-build: ${{ steps.compare.outputs.should-build }}
      versions-hash: ${{ steps.fetch.outputs.versions-hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: scripts

      - name: Fetch latest versions
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/fetch-versions.sh

      - name: Restore previous version cache
        id: cache
        uses: actions/cache@v4
        with:
          path: /tmp/version-hash
          key: version-hash-${{ steps.fetch.outputs.versions-hash }}
          restore-keys: |
            version-hash-

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.fetch.outputs.versions-hash }}"
          if [ -f /tmp/version-hash ] && [ "$(cat /tmp/version-hash)" = "${CURRENT}" ]; then
            echo "should-build=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Versions unchanged, skipping build"
          else
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            echo "${CURRENT}" > /tmp/version-hash
            echo "::notice::Version change detected, will build"
          fi

  build-and-push:
    needs: check-versions
    if: |
      github.event_name != 'schedule' ||
      needs.check-versions.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant:
          - target: base
            tag-suffix: "latest"
          - target: node
            tag-suffix: "node"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.variant.tag-suffix }}
            type=schedule,pattern={{date 'YYYYMMDD'}}-${{ matrix.variant.tag-suffix }}
            type=sha,prefix={{date 'YYYYMMDD'}}-${{ matrix.variant.tag-suffix }}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.variant.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG=$(date -u +%Y%m%d)
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Docker images built on $(date -u +%Y-%m-%d)" \
            --target "${{ github.sha }}" \
            --latest
